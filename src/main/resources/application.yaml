spring:
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/bujirun}
    username: ${DB_USERNAME:bujirun}
    password: ${DB_PASSWORD:bujirun}
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
  mvc:
    async:
      request-timeout: -1  # 타임아웃 없음

server:
  port: 8080

tourapi:
  service-key: ${TOURAPI_SERVICE_KEY}

groq:
  api:
    key: ${GROQ_API_KEY}

odsay:
  api:
    key: ${ODSAY_API_KEY}

kakao:
  client-id: ${KAKAO_CLIENT_ID}
  redirect-uri: ${KAKAO_REDIRECT_URI}