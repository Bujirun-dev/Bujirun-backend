spring:
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/bujirun}
    username: ${DB_USERNAME:bujirun}
    password: ${DB_PASSWORD:bujirun}
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
  mvc:
    async:
      request-timeout: -1  # 타임아웃 없음
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}

server:
  port: 8080

tourapi:
  service-key: ${TOURAPI_SERVICE_KEY}

groq:
  api:
    key: ${GROQ_API_KEY}

odsay:
  api:
    key: ${ODSAY_API_KEY}

kakao:
  client-id: ${KAKAO_CLIENT_ID}
  client-secret: ${KAKAO_CLIENT_SECRET}
  redirect-uri: ${KAKAO_REDIRECT_URI}

jwt:
  secret: ${JWT_SECRET}
  access-token-expiration: 1800000
  refresh-token-expiration: 1209600000