spring:
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/bujirun}
    username: ${DB_USERNAME:bujirun}
    password: ${DB_PASSWORD:bujirun}
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

server:
  port: 8080

tourapi:
  service-key: ${TOURAPI_SERVICE_KEY}